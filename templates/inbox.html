{% extends "base.html" %}

{% block title %}Inbox - Superhero Mail{% endblock %}
{% block nav %}
<a href="/" class="nav-item"><i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i> Dashboard</a>
<a href="/inbox" class="nav-item active"><i data-lucide="inbox" class="w-3.5 h-3.5"></i> Inbox</a>
<a href="/logs" class="nav-item"><i data-lucide="file-text" class="w-3.5 h-3.5"></i> Logs</a>
<a href="/stats" class="nav-item"><i data-lucide="bar-chart-3" class="w-3.5 h-3.5"></i> Stats</a>
<a href="/config" class="nav-item"><i data-lucide="settings" class="w-3.5 h-3.5"></i> Settings</a>
{% endblock %}

{% block head %}
<style>
    .inbox-layout { display: grid; grid-template-columns: 200px 340px 1fr; height: 100%; }
    @media (max-width: 1024px) { .inbox-layout { grid-template-columns: 200px 1fr; } .detail-pane { display: none; } }
    @media (max-width: 768px) { .inbox-layout { grid-template-columns: 1fr; } .folder-pane { display: none; } }
    .mail-row { border-bottom: 1px solid transparent; }
    .mail-row:hover { background: rgba(99,102,241,0.04); }
    .dark .mail-row:hover { background: rgba(99,102,241,0.08); }
    .mail-row.active { background: rgba(99,102,241,0.08); border-left: 2px solid #6366f1; }
    .dark .mail-row.active { background: rgba(99,102,241,0.12); }
    .mail-row.unseen .mail-subject { font-weight: 600; }
    .split-tab { padding: 0.35rem 0.75rem; font-size: 0.8rem; font-weight: 500; border-radius: 0.25rem; transition: all 0.1s; cursor: pointer; }
    .split-tab:hover { background: rgba(99,102,241,0.08); }
    .dark .split-tab:hover { background: rgba(99,102,241,0.12); }
    .split-tab.active { background: #6366f1; color: white; }
    .folder-btn { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0.3rem 0.5rem; border-radius: 0.25rem; font-size: 0.8rem; transition: background 0.1s; cursor: pointer; text-align: left; }
    .folder-btn:hover { background: rgba(99,102,241,0.06); }
    .dark .folder-btn:hover { background: rgba(99,102,241,0.1); }
    .folder-btn.active { background: rgba(99,102,241,0.1); color: #6366f1; font-weight: 500; }
    .dark .folder-btn.active { background: rgba(99,102,241,0.15); color: #818cf8; }
    .detail-body { font-size: 14px; line-height: 1.6; }
    .detail-body img { max-width: 100%; }
    .detail-body a { color: #6366f1; }
    .dark .detail-body a { color: #818cf8; }
</style>
{% endblock %}

{% block content %}
<div x-data="inboxApp()" x-init="initInbox()" class="h-full">

    <template x-if="inboxError">
        <div class="mx-3 mt-3 px-3 py-2 rounded-md border border-red-200 dark:border-red-900/50 bg-red-50 dark:bg-red-950/20 text-xs text-red-700 dark:text-red-300 flex items-center justify-between">
            <span x-text="inboxError"></span>
            <button @click="inboxError = ''" class="text-red-400 hover:text-red-600 ml-2">&times;</button>
        </div>
    </template>

    <template x-if="degradedAccounts.length">
        <div class="mx-3 mt-2 px-3 py-2 rounded-md border border-amber-200 dark:border-amber-900/50 bg-amber-50 dark:bg-amber-950/20 text-xs text-amber-700 dark:text-amber-300">
            Unified Inbox teilweise geladen: <span x-text="degradedAccounts.map(item => item.account).filter(Boolean).join(', ')"></span>
        </div>
    </template>

    <template x-if="searchActive">
        <div class="mx-3 mt-2 px-3 py-2 rounded-md border border-brand-200 dark:border-brand-800/50 bg-brand-50 dark:bg-brand-950/20 text-xs text-brand-700 dark:text-brand-300 flex items-center justify-between">
            <span x-text="`Suche: &quot;${searchQuery}&quot; (${mails.length} Treffer)` + (searchAccountFilter ? ' in ' + searchAccountFilter : '') + (searchFolderFilter ? '/' + searchFolderFilter : '')"></span>
            <button @click="clearSearch()" class="text-brand-500 hover:text-brand-700 ml-2 text-[11px] font-medium">Beenden</button>
        </div>
    </template>

    <template x-if="selectedCount > 0">
        <div class="mx-3 mt-2 px-3 py-2 rounded-md bg-brand-50 dark:bg-brand-950/20 border border-brand-200 dark:border-brand-800/40 flex flex-wrap items-center gap-2 text-xs">
            <span class="font-medium text-brand-700 dark:text-brand-300" x-text="selectedCount + ' ausgewählt'"></span>
            <button @click="bulkAction('read')" class="px-2 py-1 rounded bg-white dark:bg-surface-2 border border-slate-200 dark:border-surface-3 hover:bg-slate-50 dark:hover:bg-surface-3">Gelesen</button>
            <button @click="bulkAction('unread')" class="px-2 py-1 rounded bg-white dark:bg-surface-2 border border-slate-200 dark:border-surface-3 hover:bg-slate-50 dark:hover:bg-surface-3">Ungelesen</button>
            <button @click="bulkAction('flag')" class="px-2 py-1 rounded bg-white dark:bg-surface-2 border border-slate-200 dark:border-surface-3 hover:bg-slate-50 dark:hover:bg-surface-3">Stern</button>
            <button @click="bulkAction('delete')" class="px-2 py-1 rounded bg-red-600 text-white hover:bg-red-700">Löschen</button>
            <input x-model="bulkTag" type="text" placeholder="Tag" class="px-2 py-1 rounded border border-slate-200 dark:border-surface-3 bg-white dark:bg-surface-2 w-20 text-xs">
            <button @click="bulkAction('tag')" class="px-2 py-1 rounded bg-white dark:bg-surface-2 border border-slate-200 dark:border-surface-3 hover:bg-slate-50 dark:hover:bg-surface-3">Tag</button>
            <button @click="clearSelection()" class="ml-auto text-slate-400 hover:text-slate-600">Aufheben</button>
        </div>
    </template>

    <div class="inbox-layout flex-1">
        <aside class="folder-pane border-r border-slate-200 dark:border-surface-3 bg-white dark:bg-surface-1 overflow-y-auto">
            <div class="p-2 border-b border-slate-100 dark:border-surface-3">
                <button @click="selectUnified()" class="folder-btn" :class="isUnified ? 'active' : ''">
                    <span class="flex items-center gap-1.5"><i data-lucide="layers" class="w-3.5 h-3.5"></i> Alle Konten</span>
                    <span class="text-[10px] px-1.5 py-0.5 rounded-full bg-brand-600 text-white font-medium" x-text="totalUnread"></span>
                </button>
            </div>
            <div class="p-2 space-y-0.5">
                <template x-for="acc in accounts" :key="acc.name">
                    <div>
                        <button @click="acc.expanded = !acc.expanded" class="w-full flex items-center justify-between px-2 py-1.5 text-xs font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-surface-2 rounded">
                            <span class="truncate" x-text="acc.name"></span>
                            <i data-lucide="chevron-down" class="w-3 h-3 transition-transform" :class="acc.expanded ? '' : '-rotate-90'"></i>
                        </button>
                        <div x-show="acc.expanded" class="space-y-0.5 pl-1">
                            <template x-for="folder in acc.folders" :key="folder.name">
                                <button @click="selectFolder(acc.name, folder.name)" class="folder-btn text-xs" :class="!isUnified && currentAccount === acc.name && currentFolder === folder.name ? 'active' : ''">
                                    <span class="truncate" x-text="folderDisplayName(folder)"></span>
                                    <span class="text-[10px] text-slate-400" x-text="folder.unread || ''"></span>
                                </button>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </aside>

        <section class="mail-list flex flex-col border-r border-slate-200 dark:border-surface-3">
            <div class="p-2 border-b border-slate-100 dark:border-surface-3 space-y-2">
                <div class="flex items-center gap-1">
                    <button @click="setSplitView('all')" class="split-tab" :class="splitView === 'all' ? 'active' : 'text-slate-500 dark:text-slate-400'">
                        Alle <span class="text-[10px] ml-1 opacity-70" x-text="totalMails"></span>
                    </button>
                    <button @click="setSplitView('important')" class="split-tab" :class="splitView === 'important' ? 'active' : 'text-slate-500 dark:text-slate-400'">
                        <i data-lucide="alert-circle" class="w-3 h-3 inline -mt-0.5"></i> <span class="text-[10px] ml-0.5 opacity-70" x-text="importantCount"></span>
                    </button>
                    <button @click="setSplitView('unread')" class="split-tab" :class="splitView === 'unread' ? 'active' : 'text-slate-500 dark:text-slate-400'">
                        <i data-lucide="mail" class="w-3 h-3 inline -mt-0.5"></i> <span class="text-[10px] ml-0.5 opacity-70" x-text="unreadCount"></span>
                    </button>
                    <button @click="setSplitView('flagged')" class="split-tab" :class="splitView === 'flagged' ? 'active' : 'text-slate-500 dark:text-slate-400'">
                        <i data-lucide="star" class="w-3 h-3 inline -mt-0.5"></i> <span class="text-[10px] ml-0.5 opacity-70" x-text="flaggedCount"></span>
                    </button>
                </div>
                <div class="flex items-center gap-1.5">
                    <div class="flex-1 flex items-center gap-1.5 px-2 py-1.5 rounded-md border border-slate-200 dark:border-surface-3 bg-white dark:bg-surface-2">
                        <i data-lucide="search" class="w-3.5 h-3.5 text-slate-400 shrink-0"></i>
                        <input x-model="searchQuery" @input="debounceSearch()" @keydown.enter.prevent="runFilteredSearch()" @keydown.escape="clearSearch()" type="text" placeholder="Suchen..." class="flex-1 bg-transparent text-xs outline-none dark:text-white placeholder-slate-400">
                    </div>
                    <button @click="this._foldersCacheTime=0; loadMails()" class="p-1.5 rounded-md border border-slate-200 dark:border-surface-3 hover:bg-slate-50 dark:hover:bg-surface-3 transition-colors" title="Neu laden">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5 text-slate-400"></i>
                    </button>
                    <button @click="openAiPanel()" class="p-1.5 rounded-md bg-brand-600 hover:bg-brand-700 text-white transition-colors" title="KI-Frage">
                        <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
                <div class="flex items-center gap-1.5 text-[11px] text-slate-400">
                    <input type="checkbox" :checked="allVisibleSelected" @change="toggleSelectVisible($event.target.checked)" class="w-3 h-3">
                    <span x-text="visibleMails.length + ' / ' + totalMails"></span>
                    <span x-show="degradedAccounts.length" class="px-1.5 py-0.5 rounded-full bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-300">teilweise</span>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto">
                <template x-if="loading && visibleMails.length === 0">
                    <div class="flex items-center justify-center h-32 text-xs text-slate-400">
                        <i data-lucide="loader" class="w-4 h-4 animate-spin mr-2"></i> Lade Emails...
                    </div>
                </template>
                <template x-if="!loading && visibleMails.length === 0">
                    <div class="flex items-center justify-center h-32 text-xs text-slate-400">
                        <div>
                            <div class="font-medium text-slate-600 dark:text-slate-300" x-text="emptyStateTitle()"></div>
                            <div class="mt-0.5" x-text="emptyStateText()"></div>
                        </div>
                    </div>
                </template>
                <template x-for="group in priorityGroups" :key="group.key">
                    <div x-show="group.mails.length > 0">
                        <div class="sticky top-0 z-10 px-3 py-1.5 bg-white/95 dark:bg-surface-1/95 backdrop-blur-sm border-b border-slate-100 dark:border-surface-3">
                            <div class="flex items-center justify-between">
                                <span class="text-[10px] font-semibold uppercase tracking-wider" :class="priorityHeaderClass(group.key)" x-text="group.label"></span>
                                <span class="text-[10px] text-slate-400" x-text="group.mails.length"></span>
                            </div>
                        </div>
                        <template x-for="mail in group.mails" :key="mail.account + ':' + mail.folder + ':' + mail.uid">
                            <div class="mail-row px-3 py-2.5 cursor-pointer" :class="[{ 'active': selectedMailKey === mailKey(mail), 'unseen': !mail.seen }]" @click="selectMail(mail)">
                                <div class="flex items-start gap-2.5">
                                    <input type="checkbox" :checked="isSelected(mail)" @click.stop @change="toggleSelection(mail)" class="mt-0.5 w-3 h-3 shrink-0">
                                    <button @click.stop="toggleFlag(mail)" class="mt-0.5 shrink-0">
                                        <i data-lucide="star" class="w-3.5 h-3.5" :class="mail.flagged ? 'fill-yellow-500 text-yellow-500' : 'text-slate-300 dark:text-surface-4 hover:text-yellow-400'"></i>
                                    </button>
                                    <div class="min-w-0 flex-1">
                                        <div class="flex items-center justify-between gap-2">
                                            <span class="truncate text-[13px] font-medium text-slate-900 dark:text-white" x-text="cleanSender(mail.from)"></span>
                                            <span class="text-[11px] text-slate-400 whitespace-nowrap" x-text="formatDate(mail.date)"></span>
                                        </div>
                                        <div class="mail-subject truncate text-[13px] text-slate-600 dark:text-slate-300" x-text="mail.subject || '(Kein Betreff)'"></div>
                                        <template x-if="mail.ai_summary">
                                            <div class="mt-0.5 flex items-center gap-1 text-[11px] text-brand-600 dark:text-brand-400">
                                                <i data-lucide="sparkles" class="w-2.5 h-2.5 shrink-0"></i>
                                                <span class="truncate" x-text="mail.ai_summary"></span>
                                            </div>
                                        </template>
                                        <template x-if="!mail.ai_summary && mail.body_text && showAiSummaries">
                                            <div class="mt-0.5 text-[11px] text-slate-400 truncate" x-text="previewText(mail.body_text)"></div>
                                        </template>
                                        <div class="mt-1 flex items-center gap-1.5 text-[10px] text-slate-400">
                                            <span x-show="isUnified" x-text="mail.account"></span>
                                            <span x-show="mail.folder && isUnified" class="opacity-50">/</span>
                                            <span x-show="mail.folder" x-text="mail.folder"></span>
                                            <span class="px-1 py-0.5 rounded" :class="priorityPillClass(mail.smart_priority)" x-text="priorityLabel(mail.smart_priority)"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <div class="px-3 py-1.5 border-t border-slate-100 dark:border-surface-3 flex items-center justify-between text-[11px] text-slate-400">
                <span x-text="hasMoreMails ? `Seite ${page}` : `${page} · Ende`"></span>
                <button @click="loadMoreMails()" :disabled="loading || !hasMoreMails || searchActive" class="px-2 py-1 rounded border border-slate-200 dark:border-surface-3 hover:bg-slate-50 dark:hover:bg-surface-3 disabled:opacity-40 disabled:cursor-not-allowed text-[11px]">Mehr</button>
            </div>
        </section>

        <section class="detail-pane overflow-hidden">
            <template x-if="selectedMail">
                <div class="flex flex-col h-full">
                    <div class="shrink-0 border-b border-slate-100 dark:border-surface-3 p-4 space-y-3">
                        <div class="flex items-start justify-between gap-3">
                            <div class="min-w-0">
                                <h2 class="text-base font-semibold text-slate-900 dark:text-white truncate" x-text="selectedMail.subject || '(Kein Betreff)'"></h2>
                                <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">
                                    <span x-text="selectedMail.from"></span>
                                    <span class="mx-1.5 opacity-40">&middot;</span>
                                    <span x-text="formatDateFull(selectedMail.date)"></span>
                                </p>
                            </div>
                            <div class="flex items-center gap-1.5 shrink-0">
                                <button @click="toggleReadFlag(selectedMail)" class="p-1.5 rounded-md border border-slate-200 dark:border-surface-3 hover:bg-slate-50 dark:hover:bg-surface-3 transition-colors" title="Gelesen/Ungelesen">
                                    <i data-lucide="mail-open" class="w-3.5 h-3.5 text-slate-400"></i>
                                </button>
                                <button @click="openReply(selectedMail)" class="p-1.5 rounded-md border border-slate-200 dark:border-surface-3 hover:bg-slate-50 dark:hover:bg-surface-3 transition-colors" title="Antworten">
                                    <i data-lucide="reply" class="w-3.5 h-3.5 text-slate-400"></i>
                                </button>
                                <button @click="deleteMail(selectedMail)" class="p-1.5 rounded-md border border-slate-200 dark:border-surface-3 hover:bg-red-50 dark:hover:bg-red-950/30 transition-colors" title="Löschen">
                                    <i data-lucide="trash-2" class="w-3.5 h-3.5 text-slate-400 hover:text-red-500"></i>
                                </button>
                            </div>
                        </div>

                        <div class="flex flex-wrap items-center gap-1.5 text-[11px]">
                            <span class="px-1.5 py-0.5 rounded bg-slate-100 dark:bg-surface-3 text-slate-600 dark:text-slate-400" x-text="selectedMail.account"></span>
                            <span class="px-1.5 py-0.5 rounded bg-slate-100 dark:bg-surface-3 text-slate-600 dark:text-slate-400" x-text="selectedMail.folder"></span>
                            <template x-if="selectedMail.analysis && selectedMail.analysis.importance">
                                <span class="px-1.5 py-0.5 rounded bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300" x-text="'Priorität: ' + selectedMail.analysis.importance"></span>
                            </template>
                            <template x-if="selectedMail.analysis && selectedMail.analysis.action_needed">
                                <span class="px-1.5 py-0.5 rounded bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300">Aktion nötig</span>
                            </template>
                            <template x-for="tag in (selectedMail.tags || [])" :key="tag">
                                <button @click="removeTagForMail(tag)" class="px-1.5 py-0.5 rounded bg-brand-100 dark:bg-brand-900/30 text-brand-700 dark:text-brand-300 hover:bg-brand-200" x-text="'#' + tag"></button>
                            </template>
                            <div class="flex items-center gap-1 ml-1">
                                <input x-model="newTag" @keydown.enter.prevent="addTagForMail(newTag)" type="text" placeholder="+Tag" class="px-2 py-0.5 rounded border border-slate-200 dark:border-surface-3 bg-white dark:bg-surface-2 text-[11px] w-16">
                            </div>
                            <template x-if="selectedMail.unsubscribe_options && selectedMail.unsubscribe_options.length > 0">
                                <button @click="unsubscribeSelectedMail()" class="px-1.5 py-0.5 rounded bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300 hover:bg-amber-200">Abbestellen</button>
                            </template>
                        </div>

                        <template x-if="selectedMail.thread && selectedMail.thread.length">
                            <div class="border border-slate-200 dark:border-surface-3 rounded-lg p-2.5 space-y-1.5">
                                <div class="flex items-center justify-between text-[11px]">
                                    <span class="font-medium text-slate-500 uppercase tracking-wider">Thread</span>
                                    <span class="text-slate-400" x-text="selectedMail.thread.length + ' Nachrichten'"></span>
                                </div>
                                <div class="space-y-1 max-h-40 overflow-y-auto">
                                    <template x-for="item in selectedMail.thread" :key="item.message_id || item.subject || item.date">
                                        <button @click="openThreadItem(item)" class="w-full text-left px-2 py-1.5 rounded text-xs transition-colors" :class="item.is_selected ? 'bg-brand-50 dark:bg-brand-900/20 text-brand-700 dark:text-brand-300' : 'hover:bg-slate-50 dark:hover:bg-surface-2 text-slate-600 dark:text-slate-400'">
                                            <div class="flex items-center justify-between gap-2">
                                                <span class="truncate font-medium" x-text="item.subject || '(Kein Betreff)'"></span>
                                                <span class="text-[10px] text-slate-400 whitespace-nowrap" x-text="formatDateFull(item.date)"></span>
                                            </div>
                                            <div class="truncate text-[11px] text-slate-400 mt-0.5" x-text="item.from || '?'"></div>
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div class="flex-1 min-h-0 flex flex-col">
                        <div class="flex-1 overflow-y-auto p-4 space-y-4">
                            <template x-if="selectedMail.analysis && selectedMail.analysis.summary">
                                <div class="rounded-lg border border-brand-200 dark:border-brand-800/30 bg-brand-50 dark:bg-brand-950/20 p-3">
                                    <div class="text-[10px] font-semibold uppercase tracking-wider text-brand-600 dark:text-brand-400 mb-1">KI-Zusammenfassung</div>
                                    <p class="text-xs text-brand-800 dark:text-brand-200" x-text="selectedMail.analysis.summary"></p>
                                </div>
                            </template>

                            <template x-if="selectedMail.body_html">
                                <div class="detail-body max-w-none" x-html="sanitizeHtml(selectedMail.body_html)"></div>
                            </template>
                            <template x-if="!selectedMail.body_html">
                                <pre class="whitespace-pre-wrap text-sm font-sans leading-relaxed text-slate-700 dark:text-slate-300" x-text="selectedMail.body_text || ''"></pre>
                            </template>

                            <template x-if="selectedMail.attachments && selectedMail.attachments.length">
                                <div>
                                    <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Anhänge</div>
                                    <div class="flex flex-wrap gap-1.5">
                                        <template x-for="(att, idx) in selectedMail.attachments" :key="idx">
                                            <a :href="'/api/email/' + encodeURIComponent(selectedMail.account) + '/' + encodeURIComponent(selectedMail.folder) + '/' + selectedMail.uid + '/attachment/' + idx" class="px-2.5 py-1.5 rounded-md border border-slate-200 dark:border-surface-3 text-xs text-slate-600 dark:text-slate-400 hover:border-brand-300 hover:text-brand-600 transition-colors flex items-center gap-1.5">
                                                <i data-lucide="paperclip" class="w-3 h-3"></i>
                                                <span x-text="att.filename"></span>
                                            </a>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <div class="shrink-0 border-t border-slate-200 dark:border-surface-3 bg-white dark:bg-surface-1">
                            <template x-if="replyGenerating || replyAdapting">
                                <div class="h-0.5 bg-brand-600 animate-pulse"></div>
                            </template>
                            <template x-if="replyError">
                                <div class="px-3 py-1.5 text-[11px] text-red-700 dark:text-red-300 bg-red-50 dark:bg-red-950/20 border-b border-red-100 dark:border-red-900/30 flex items-center justify-between">
                                    <span x-text="replyError"></span>
                                    <button @click="replyError = ''" class="text-red-400">&times;</button>
                                </div>
                            </template>
                            <div class="px-3 py-1.5 border-b border-slate-100 dark:border-surface-3 flex flex-wrap items-center gap-1.5">
                                <div class="relative" x-data="{ open: false }">
                                    <button @click="open = !open; if(open) loadTemplates()" class="px-2 py-1 rounded border border-slate-200 dark:border-surface-3 text-[11px] flex items-center gap-1 hover:bg-slate-50 dark:hover:bg-surface-2">
                                        <i data-lucide="file-text" class="w-3 h-3"></i> Vorlage
                                    </button>

{% block scripts %}
<script>
function inboxApp() {
    return {
        accounts: [],
        mails: [],
        totalMails: 0,
        degradedAccounts: [],
        loading: false,
        foldersLoading: false,
        page: 1,
        perPage: 25,
        isUnified: true,
        currentAccount: '',
        currentFolder: 'INBOX',
        selectedMail: null,
        selectedMailKey: '',
        selectedKeys: {},
        searchQuery: '',
        searchTimer: null,
        searchAccountFilter: '',
        searchFolderFilter: '',
        searchDateFilter: '',
        showAiPanel: false,
        aiQuestion: '',
        aiAnswer: null,
        aiLoading: false,
        aiError: '',
        aiStatus: null,
        aiHistory: [],
        bulkTag: '',
        bulkMoveFolder: '',
        newTag: '',
        activePriorityFilter: 'all',
        splitView: localStorage.getItem('superhero.splitView') || 'all',
        showAiSummaries: localStorage.getItem('superhero.aiSummaries') !== 'false',
        inboxError: '',
        composeError: '',
        sendingCompose: false,
        replyDraft: '',
        replySubject: '',
        replyTo: '',
        replyCc: '',
        replyTone: 'freundlich',
        replyGenerating: false,
        replyAdapting: false,
        replySending: false,
        replyError: '',
        replyAttachments: [],
        replyInReplyTo: '',
        replyReferences: '',
        savedDrafts: {},
        showTemplateManager: false,
        templateForm: { name: '', body: '', category: 'Allgemein' },
        editingTemplate: null,
        templateSearchQuery: '',
        templates: [],
        draftSaveTimer: null,
        showCompose: false,
        composeMode: 'new',
        compose: { account: '', to: '', cc: '', subject: '', body: '', in_reply_to: '', references: '', attachments: [] },
        storageKey: 'mail-ai-sorter.inbox-state.v1',

        async fetchJson(url, options = {}) {
            const timeoutMs = Number(options.timeoutMs || 20000);
            const fetchOptions = { ...options };
            delete fetchOptions.timeoutMs;
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const response = await fetch(url, { ...fetchOptions, signal: controller.signal });
                const data = await response.json().catch(() => ({}));
                if (!response.ok || data.error) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }
                return data;
            } finally {
                clearTimeout(timeout);
            }
        },

        get totalUnread() {
            return this.accounts.reduce((sum, acc) => sum + (acc.unreadTotal || 0), 0);
        },

        get selectedCount() {
            return Object.keys(this.selectedKeys).length;
        },

        get allVisibleSelected() {
            return this.visibleMails.length > 0 && this.visibleMails.every(mail => this.isSelected(mail));
        },

        get searchActive() {
            return !!this.searchQuery.trim();
        },

        get hasMoreMails() {
            return !this.searchActive && this.mails.length < this.totalMails;
        },

        get accountFolders() {
            if (!this.searchAccountFilter) return [];
            const acc = this.accounts.find(a => a.name === this.searchAccountFilter);
            return acc?.folders || [];
        },

        get visibleMails() {
            let result = this.mails;
            if (this.activePriorityFilter !== 'all') {
                result = result.filter(mail => (mail.smart_priority || 'info') === this.activePriorityFilter);
            }
            if (this.splitView === 'important') {
                result = result.filter(m => ['dringend', 'hoch', 'heute'].includes(m.smart_priority) || m.flagged);
            } else if (this.splitView === 'unread') {
                result = result.filter(m => !m.seen);
            } else if (this.splitView === 'flagged') {
                result = result.filter(m => m.flagged);
            }
            return result;
        },

        get importantCount() {
            return this.mails.filter(m => ['dringend', 'hoch', 'heute'].includes(m.smart_priority) || m.flagged).length;
        },

        get unreadCount() {
            return this.mails.filter(m => !m.seen).length;
        },

        get flaggedCount() {
            return this.mails.filter(m => m.flagged).length;
        },

        setSplitView(view) {
            this.splitView = view;
            localStorage.setItem('superhero.splitView', view);
        },

        previewText(body) {
            if (!body) return '';
            const text = body.replace(/\s+/g, ' ').trim();
            return text.length > 80 ? text.slice(0, 80) + '...' : text;
        },

        async loadBatchSummaries() {
            if (!this.showAiSummaries) return;
            const unsampled = this.mails.slice(0, 20).filter(m => !m.ai_summary && m.body_text);
            if (unsampled.length === 0) return;
            try {
                const resp = await this.fetchJson('/api/ai/batch-summary', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mails: unsampled.map(m => ({ uid: m.uid, account: m.account, folder: m.folder, subject: m.subject, body: (m.body_text || '').slice(0, 500) })) }),
                });
                if (resp.summaries) {
                    for (const [key, summary] of Object.entries(resp.summaries)) {
                        const mail = this.mails.find(m => m.uid === key);
                        if (mail) mail.ai_summary = summary;
                    }
                }
            } catch(e) {}
        },

        get priorityGroups() {
            const order = ['dringend', 'heute', 'info', 'niedrig'];
            const source = this.visibleMails;
            return order.map(key => ({
                key,
                label: this.priorityLabel(key),
                mails: source.filter(mail => (mail.smart_priority || 'info') === key),
            }));
        },

        navigateMail(direction) {
            const allMails = this.visibleMails || [];
            if (!allMails.length) return;
            const currentKey = this.selectedMailKey;
            let currentIdx = allMails.findIndex(m => this.mailKey(m) === currentKey);
            if (currentIdx === -1) currentIdx = 0;
            const nextIdx = Math.max(0, Math.min(allMails.length - 1, currentIdx + direction));
            this.selectMail(allMails[nextIdx]);
        },

        async summarizeSelectedMail() {
            if (!this.selectedMail) return;
            try {
                const result = await this.fetchJson('/api/ai/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        subject: this.selectedMail.subject,
                        from_addr: this.selectedMail.from,
                        body: this.selectedMail.body_text || '',
                        uid: this.selectedMail.uid,
                        account: this.selectedMail.account,
                        folder: this.selectedMail.folder,
                    }),
                });
                if (result.summary) showNotification(result.summary, 'info');
                else showNotification('Keine Zusammenfassung moeglich', 'error');
            } catch(e) {
                showNotification('AI nicht erreichbar', 'error');
            }
        },

        archiveMail(mail) {
            showNotification('Archiviert: ' + (mail.subject || '').slice(0, 40));
        },

        async initInbox() {
            try { this.savedDrafts = JSON.parse(localStorage.getItem('mail-ai-sorter.drafts.v1') || '{}'); } catch(_) { this.savedDrafts = {}; }
            const cfg = await this.fetchJson('/api/config');
            this.accounts = (cfg.accounts || []).map(acc => ({ name: acc.name, folders: [], expanded: true, unreadTotal: 0 }));
            this.compose.account = this.accounts[0]?.name || '';
            this.restoreState();
            if (this.searchActive) await this.runSearch();
            else await this.loadMails();
            this.refreshFolders();
            this.restoreSelectedMail().catch(() => {});
            this.$nextTick(() => lucide.createIcons());
            this.loadBatchSummaries();
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
                    if (e.key === 'Escape') {
                        e.target.blur();
                        if (this.searchActive) this.clearSearch();
                        else if (this.showAiPanel) this.closeAiPanel();
                    }
                    return;
                }
                const key = e.key.toLowerCase();
                if (key === 'j') { e.preventDefault(); this.navigateMail(1); }
                else if (key === 'k') { e.preventDefault(); this.navigateMail(-1); }
                else if (key === 'e' && this.selectedMail) { e.preventDefault(); this.archiveMail(this.selectedMail); }
                else if (key === 'd' && this.selectedMail) { e.preventDefault(); this.deleteMail(this.selectedMail); }
                else if (key === 'f' && this.selectedMail) { e.preventDefault(); this.toggleFlag(this.selectedMail); }
                else if (key === 'a' && this.selectedMail) { e.preventDefault(); this.openReply(this.selectedMail); }
                else if (key === 'c') { e.preventDefault(); this.openNewCompose(); }
                else if (key === 's' && this.selectedMail) { e.preventDefault(); this.summarizeSelectedMail(); }
                else if (key === 'x' && this.selectedMail) { e.preventDefault(); this.toggleSelection(this.selectedMail); }
                else if (key === '/') {
                    e.preventDefault();
                    const input = document.querySelector('.mail-list input[type="text"]');
                    if (input) input.focus();
                } else if (key === 'r' && this.selectedMail) {
                    e.preventDefault();
                    const ta = document.querySelector('.detail-pane textarea');
                    if (ta) ta.focus();
                    else this.openReply(this.selectedMail);
                } else if (key === 'escape') {
                    if (this.showAiPanel) this.closeAiPanel();
                    else if (this.searchActive) this.clearSearch();
                }
            });
        },

        serializeState() {
            const selected = this.selectedMail || this.findSelectedMail();
            return {
                isUnified: this.isUnified,
                currentAccount: this.currentAccount,
                currentFolder: this.currentFolder,
                page: this.page,
                searchQuery: this.searchQuery,
                activePriorityFilter: this.activePriorityFilter,
                selectedMail: selected ? { account: selected.account, folder: selected.folder, uid: selected.uid } : null,
            };
        },

        syncUrl() {
            const params = new URLSearchParams();
            params.set('view', this.isUnified ? 'unified' : 'folder');
            if (!this.isUnified && this.currentAccount) params.set('account', this.currentAccount);
            if (!this.isUnified && this.currentFolder) params.set('folder', this.currentFolder);
            if (this.searchQuery) params.set('q', this.searchQuery);
            if (this.page > 1) params.set('page', String(this.page));
            if (this.activePriorityFilter !== 'all') params.set('priority', this.activePriorityFilter);
            const selected = this.selectedMail || this.findSelectedMail();
            if (selected?.account) params.set('selected_account', selected.account);
            if (selected?.folder) params.set('selected_folder', selected.folder);
            if (selected?.uid) params.set('selected_uid', selected.uid);
            const query = params.toString();
            const nextUrl = query ? `${window.location.pathname}?${query}` : window.location.pathname;
            window.history.replaceState({}, '', nextUrl);
        },

        persistState() {
            const state = this.serializeState();
            localStorage.setItem(this.storageKey, JSON.stringify(state));
            this.syncUrl();
        },

        restoreState() {
            let stored = {};
            try { stored = JSON.parse(localStorage.getItem(this.storageKey) || '{}') || {}; } catch (_) { stored = {}; }
            const params = new URLSearchParams(window.location.search);
            const view = params.get('view') || (stored.isUnified === false ? 'folder' : 'unified');
            this.isUnified = view !== 'folder';
            this.currentAccount = params.get('account') || stored.currentAccount || '';
            this.currentFolder = params.get('folder') || stored.currentFolder || (this.isUnified ? '' : 'INBOX');
            this.page = Math.max(1, Number(params.get('page') || stored.page || 1));
            this.searchQuery = params.get('q') || stored.searchQuery || '';
            this.activePriorityFilter = params.get('priority') || stored.activePriorityFilter || 'all';
            const selectedAccount = params.get('selected_account') || stored.selectedMail?.account || '';
            const selectedFolder = params.get('selected_folder') || stored.selectedMail?.folder || '';
            const selectedUid = params.get('selected_uid') || stored.selectedMail?.uid || '';
            this.selectedMail = null;
            this.selectedMailKey = selectedAccount && selectedFolder && selectedUid ? `${selectedAccount}:${selectedFolder}:${selectedUid}` : '';
            if (!this.isUnified && !this.currentFolder) this.currentFolder = 'INBOX';
            if (this.isUnified) { this.currentAccount = ''; this.currentFolder = ''; }
        },

        findSelectedMail() {
            return this.mails.find(mail => this.mailKey(mail) === this.selectedMailKey) || null;
        },

        async restoreSelectedMail() {
            const mail = this.findSelectedMail();
            if (!mail) {
                if (!this.mails.some(item => this.mailKey(item) === this.selectedMailKey)) {
                    this.selectedMail = null;
                    this.selectedMailKey = '';
                    this.persistState();
                }
                return;
            }
            if (this.selectedMail && this.mailKey(this.selectedMail) === this.selectedMailKey) return;
            await this.selectMail(mail, { preserveState: true });
        },

        mailKey(mail) { return `${mail.account}:${mail.folder}:${mail.uid}`; },

        isSelected(mail) { return !!this.selectedKeys[this.mailKey(mail)]; },

        toggleSelection(mail) {
            const key = this.mailKey(mail);
            if (this.selectedKeys[key]) delete this.selectedKeys[key];
            else this.selectedKeys[key] = { uid: mail.uid, account: mail.account, folder: mail.folder };
            this.selectedKeys = { ...this.selectedKeys };
        },

        toggleSelectVisible(checked) {
            for (const mail of this.mails) {
                const key = this.mailKey(mail);
                if (checked) this.selectedKeys[key] = { uid: mail.uid, account: mail.account, folder: mail.folder };
                else delete this.selectedKeys[key];
            }
            this.selectedKeys = { ...this.selectedKeys };
        },

        clearSelection() { this.selectedKeys = {}; },

        priorityCount(key) {
            if (key === 'all') return this.mails.length;
            return this.mails.filter(mail => (mail.smart_priority || 'info') === key).length;
        },

        priorityLabel(key) {
            return { dringend: 'Dringend', heute: 'Heute', info: 'Info', niedrig: 'Niedrig' }[key] || 'Unklar';
        },

        priorityPillClass(key) {
            return {
                dringend: 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-300',
                heute: 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300',
                info: 'bg-brand-100 text-brand-700 dark:bg-brand-900/30 dark:text-brand-300',
                niedrig: 'bg-slate-100 text-slate-600 dark:bg-surface-3 dark:text-slate-400',
            }[key] || 'bg-slate-100 text-slate-600';
        },

        priorityHeaderClass(key) {
            return {
                dringend: 'text-red-600 dark:text-red-400',
                heute: 'text-amber-600 dark:text-amber-400',
                info: 'text-brand-600 dark:text-brand-400',
                niedrig: 'text-slate-500 dark:text-slate-400',
            }[key] || 'text-slate-500';
        },

        _foldersCache: null,
        _foldersCacheTime: 0,
        FOLDERS_CACHE_TTL: 300000,

        async refreshFolders(force = false) {
            const now = Date.now();
            if (!force && this._foldersCache && (now - this._foldersCacheTime) < this.FOLDERS_CACHE_TTL) {
                for (const acc of this.accounts) {
                    const cached = this._foldersCache[acc.name];
                    if (cached) { acc.folders = cached.folders; acc.unreadTotal = cached.unreadTotal; }
                }
                return;
            }
            this.foldersLoading = true;
            const cache = {};
            const promises = this.accounts.map(async (acc) => {
                try {
                    const data = await this.fetchJson('/api/folders?account=' + encodeURIComponent(acc.name));
                    acc.folders = (data.folders || []).filter(folder => !(folder.flags || '').includes('\\Noselect'));
                    acc.unreadTotal = acc.folders.reduce((sum, folder) => sum + (folder.unread || 0), 0);
                    cache[acc.name] = { folders: acc.folders, unreadTotal: acc.unreadTotal };
                } catch (_) { acc.folders = []; acc.unreadTotal = 0; cache[acc.name] = { folders: [], unreadTotal: 0 }; }
            });
            await Promise.all(promises);
            this._foldersCache = cache;
            this._foldersCacheTime = now;
            this.foldersLoading = false;
            if (!this.accounts.length) this.inboxError = 'Es sind noch keine Mailkonten konfiguriert.';
        },

        emptyStateTitle() {
            if (this.inboxError) return 'Inbox derzeit nicht erreichbar';
            if (this.searchActive) return 'Keine Treffer';
            if (!this.accounts.length) return 'Keine Konten konfiguriert';
            return 'Keine Emails';
        },

        emptyStateText() {
            if (this.inboxError) return 'Prüfe IMAP-Zugang und Netzwerk.';
            if (this.searchActive) return 'Anderer Suchbegriff?';
            if (!this.accounts.length) return 'Lege zuerst ein Konto an.';
            return 'In diesem Ordner liegt nichts.';
        },

        folderDisplayName(folder) {
            const map = { INBOX: 'Posteingang', Sent: 'Gesendet', 'Sent Messages': 'Gesendet', Drafts: 'Entwürfe', Trash: 'Papierkorb', Spam: 'Spam', Junk: 'Spam' };
            return map[folder.display || folder.name] || folder.display || folder.name;
        },

        async selectUnified() {
            this.isUnified = true; this.currentAccount = ''; this.currentFolder = '';
            this.page = 1; this.clearSearch(false); this.selectedMail = null; this.selectedMailKey = '';
            await this.loadMails();
        },

        async selectFolder(account, folder) {
            this.isUnified = false; this.currentAccount = account; this.currentFolder = folder;
            this.page = 1; this.clearSearch(false); this.selectedMail = null; this.selectedMailKey = '';
            await this.loadMails();
        },

        async loadMails(append = false) {
            this.loading = true; this.inboxError = ''; this.degradedAccounts = [];
            try {
                const url = this.isUnified
                    ? `/api/unified-inbox?page=${this.page}&per_page=${this.perPage}`
                    : `/api/inbox?account=${encodeURIComponent(this.currentAccount)}&folder=${encodeURIComponent(this.currentFolder)}&page=${this.page}&per_page=${this.perPage}`;
                const data = await this.fetchJson(url);
                const incoming = data.emails || [];
                if (append) {
                    const existing = new Set(this.mails.map(mail => this.mailKey(mail)));
                    this.mails = [...this.mails, ...incoming.filter(mail => !existing.has(this.mailKey(mail)))];
                } else { this.mails = incoming; }
                this.totalMails = data.total || 0;
                this.degradedAccounts = data.failures || [];
                await this.restoreSelectedMail();
                this.persistState();
            } catch (error) {
                this.mails = []; this.totalMails = 0; this.degradedAccounts = [];
                this.inboxError = error.message || 'Inbox konnte nicht geladen werden';
                showNotification(error.message || 'Inbox konnte nicht geladen werden', 'error');
            } finally {
                this.loading = false;
                this.$nextTick(() => lucide.createIcons());
            }
        },

        async loadMoreMails() {
            if (!this.hasMoreMails || this.loading) return;
            this.page += 1;
            await this.loadMails(true);
        },

        clearSearch(reload = true) {
            if (!this.searchQuery && !this.searchAccountFilter && !this.searchFolderFilter && !this.searchDateFilter && reload) {
                this.persistState(); return;
            }
            this.searchQuery = ''; this.searchAccountFilter = ''; this.searchFolderFilter = ''; this.searchDateFilter = '';
            clearTimeout(this.searchTimer); this.page = 1;
            if (reload) this.loadMails(); else this.persistState();
        },

        async selectMail(mail, options = {}) {
            this.selectedMailKey = this.mailKey(mail);
            if (!mail.seen) {
                mail.seen = true;
                fetch(`/api/email/${encodeURIComponent(mail.account)}/${encodeURIComponent(mail.folder)}/${mail.uid}/flag`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'read' }),
                }).catch(() => {});
            }
            try {
                this.selectedMail = await this.fetchJson(`/api/email/${encodeURIComponent(mail.account)}/${encodeURIComponent(mail.folder)}/${mail.uid}`, { timeoutMs: 15000 });
                this.newTag = '';
                await this.initInlineReply();
                this.persistState();
                this.$nextTick(() => lucide.createIcons());
            } catch (error) {
                this.selectedMail = null;
                if (!options.preserveState) this.persistState();
                showNotification(error.message || 'Email konnte nicht geladen werden', 'error');
            }
        },

        async openThreadItem(item) {
            if (!item?.uid || item.is_selected) return;
            const listItem = this.mails.find(mail => this.mailKey(mail) === this.mailKey(item));
            if (listItem) { await this.selectMail(listItem); return; }
            this.selectedMailKey = this.mailKey(item);
            await this.selectMail(item);
        },

        async toggleFlag(mail) {
            const action = mail.flagged ? 'unflag' : 'flag';
            const previous = mail.flagged;
            mail.flagged = !mail.flagged;
            try {
                await this.fetchJson(`/api/email/${encodeURIComponent(mail.account)}/${encodeURIComponent(mail.folder)}/${mail.uid}/flag`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action }),
                });
            } catch (error) { mail.flagged = previous; showNotification(error.message || 'Markierung fehlgeschlagen', 'error'); }
        },

        async toggleReadFlag(mail) {
            const action = mail.seen ? 'unread' : 'read';
            const previous = mail.seen;
            mail.seen = !mail.seen;
            try {
                await this.fetchJson(`/api/email/${encodeURIComponent(mail.account)}/${encodeURIComponent(mail.folder)}/${mail.uid}/flag`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action }),
                });
            } catch (error) { mail.seen = previous; showNotification(error.message || 'Statusänderung fehlgeschlagen', 'error'); }
        },

        async deleteMail(mail) {
            if (!confirm('Email wirklich löschen?')) return;
            try {
                await this.fetchJson(`/api/email/${encodeURIComponent(mail.account)}/${encodeURIComponent(mail.folder)}/${mail.uid}/flag`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'delete' }),
                });
            } catch (error) { showNotification(error.message || 'Löschen fehlgeschlagen', 'error'); return; }
            this.mails = this.mails.filter(item => this.mailKey(item) !== this.mailKey(mail));
            if (this.selectedMailKey === this.mailKey(mail)) { this.selectedMail = null; this.selectedMailKey = ''; }
            this.persistState();
            showNotification('Email gelöscht');
        },

        async runSearch() {
            if (!this.searchQuery) { this.degradedAccounts = []; await this.loadMails(); return; }
            await this.runFilteredSearch();
        },

        debounceSearch() {
            clearTimeout(this.searchTimer);
            this.searchTimer = setTimeout(async () => {
                if (this.searchQuery.trim().length >= 2) await this.runFilteredSearch();
                else if (!this.searchQuery.trim()) await this.runSearch();
            }, 250);
        },

        async bulkAction(action) {
            const items = Object.values(this.selectedKeys);
            if (!items.length) return;
            const payload = { items, action, tag: this.bulkTag, target_folder: this.bulkMoveFolder };
            let data;
            try {
                data = await this.fetchJson('/api/email/bulk', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            } catch (error) { showNotification(error.message || 'Bulk-Aktion fehlgeschlagen', 'error'); return; }
            showNotification(`${data.updated || 0} Emails aktualisiert`);
            this.clearSelection(); this.bulkTag = '';
            if (action === 'delete' || action === 'move') { await this.loadMails(); }
            else {
                for (const mail of this.mails) {
                    const key = this.mailKey(mail);
                    const hit = items.find(item => `${item.account}:${item.folder}:${item.uid}` === key);
                    if (!hit) continue;
                    if (action === 'read') mail.seen = true;
                    if (action === 'unread') mail.seen = false;
                    if (action === 'flag') mail.flagged = true;
                    if (action === 'unflag') mail.flagged = false;
                }
            }
            if (this.selectedMail && ['tag', 'untag'].includes(action)) await this.selectMail(this.selectedMail);
            this.persistState();
        },

        async addTagForMail(tag) {
            if (!this.selectedMail || !tag) return;
            await this.fetchJson('/api/tags', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ msg_uid: this.selectedMail.uid, account: this.selectedMail.account, folder: this.selectedMail.folder, tag }) });
            this.selectedMail.tags = this.selectedMail.tags || [];
            if (!this.selectedMail.tags.includes(tag)) this.selectedMail.tags.push(tag);
            this.newTag = ''; this.persistState();
        },

        async removeTagForMail(tag) {
            if (!this.selectedMail) return;
            await this.fetchJson(`/api/tags/${this.selectedMail.uid}/${this.selectedMail.account}/${this.selectedMail.folder}?tag=${encodeURIComponent(tag)}`, { method: 'DELETE' });
            this.selectedMail.tags = (this.selectedMail.tags || []).filter(item => item !== tag);
            this.persistState();
        },

        async generateAnalysis() {
            if (!this.selectedMail) return;
            let data;
            try {
                data = await this.fetchJson('/api/llm/analyze-email', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid: this.selectedMail.uid, account: this.selectedMail.account, folder: this.selectedMail.folder, subject: this.selectedMail.subject || '', from_addr: this.selectedMail.from || '', body: this.selectedMail.body_text || this.selectedMail.body_html || '', category: this.selectedMail.analysis?.category || 'auto' }),
                });
            } catch (error) { showNotification(error.message || 'Analyse fehlgeschlagen', 'error'); return; }
            this.selectedMail.analysis = data;
            const listItem = this.mails.find(mail => this.mailKey(mail) === this.selectedMailKey);
            if (listItem) {
                listItem.analysis = data;
                listItem.priority_score = data.priority_score ?? listItem.priority_score;
                if ((data.priority_score ?? 0) >= 80 || data.importance === 'hoch') listItem.smart_priority = 'dringend';
                else if ((data.priority_score ?? 0) >= 60 || data.action_needed) listItem.smart_priority = 'heute';
                else if ((data.priority_score ?? 0) >= 40) listItem.smart_priority = 'info';
                else listItem.smart_priority = 'niedrig';
                this.mails = [...this.mails];
            }
            showNotification('Analyse aktualisiert');
        },

        async unsubscribeSelectedMail() {
            if (!this.selectedMail) return;
            let data;
            try { data = await this.fetchJson(`/api/email/${encodeURIComponent(this.selectedMail.account)}/${encodeURIComponent(this.selectedMail.folder)}/${this.selectedMail.uid}/unsubscribe`, { method: 'POST' }); }
            catch (error) { showNotification(error.message || 'Abbestellen fehlgeschlagen', 'error'); return; }
            if (data.url) window.open(data.url, '_blank');
            showNotification('Unsubscribe ausgelöst');
        },

        openNewCompose() {
            this.composeMode = 'new'; this.composeError = '';
            this.compose = { account: this.currentAccount || this.accounts[0]?.name || '', to: '', cc: '', subject: '', body: '', in_reply_to: '', references: '', attachments: [] };
            this.showCompose = true;
        },

        openReply(mail) {
            this.initInlineReply();
            this.$nextTick(() => { const ta = document.querySelector('.detail-pane textarea'); if (ta) ta.focus(); });
        },

        async handleComposeAttachments(event) {
            const files = Array.from(event.target.files || []);
            const additions = [];
            for (const file of files) {
                const data_b64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(String(reader.result).split(',')[1] || '');
                    reader.onerror = () => reject(new Error(`Anhang konnte nicht gelesen werden: ${file.name}`));
                    reader.readAsDataURL(file);
                });
                additions.push({ filename: file.name, size: file.size, data_b64 });
            }
            this.compose.attachments = [...this.compose.attachments, ...additions];
            event.target.value = '';
        },

        removeComposeAttachment(index) {
            this.compose.attachments.splice(index, 1);
            this.compose.attachments = [...this.compose.attachments];
        },

        async sendCompose() {
            this.composeError = ''; this.sendingCompose = true;
            try {
                await this.fetchJson('/api/send', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account: this.compose.account, to: this.compose.to.split(',').map(item => item.trim()).filter(Boolean), cc: this.compose.cc.split(',').map(item => item.trim()).filter(Boolean), subject: this.compose.subject, body_text: this.compose.body, in_reply_to: this.compose.in_reply_to || null, references: this.compose.references || null, attachments: this.compose.attachments }),
                });
            } catch (error) {
                this.composeError = error.message || 'Senden fehlgeschlagen';
                showNotification(error.message || 'Senden fehlgeschlagen', 'error');
                this.sendingCompose = false; return;
            }
            showNotification('Email gesendet'); this.sendingCompose = false; this.showCompose = false;
        },

        cleanSender(value) {
            if (!value) return '?';
            const match = value.match(/^(.+?)\s*<.*>$/);
            return match ? match[1].replace(/"/g, '').trim() : value;
        },

        formatDate(value) {
            if (!value) return '';
            try { return new Date(value).toLocaleString('de-DE', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }); } catch (_) { return value; }
        },

        formatDateFull(value) {
            if (!value) return '';
            try { return new Date(value).toLocaleString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }); } catch (_) { return value; }
        },

        setSearchAccountFilter(account) { this.searchAccountFilter = account; this.searchFolderFilter = ''; if (this.searchActive) this.runFilteredSearch(); },
        setSearchFolderFilter(folder) { this.searchFolderFilter = folder; if (this.searchActive) this.runFilteredSearch(); },
        setSearchDateFilter(value) { this.searchDateFilter = value; if (this.searchActive) this.runFilteredSearch(); },

        getDateSinceParam() {
            if (!this.searchDateFilter) return '';
            const now = new Date();
            let d;
            if (this.searchDateFilter === '7d') d = new Date(now.getTime() - 7 * 86400000);
            else if (this.searchDateFilter === '30d') d = new Date(now.getTime() - 30 * 86400000);
            else if (this.searchDateFilter === '90d') d = new Date(now.getTime() - 90 * 86400000);
            else if (this.searchDateFilter === 'year') d = new Date(now.getFullYear(), 0, 1);
            else return '';
            return d.toISOString().slice(0, 10);
        },

        async runFilteredSearch() {
            if (!this.searchQuery || this.searchQuery.trim().length < 2) {
                if (!this.searchQuery) { this.degradedAccounts = []; await this.loadMails(); }
                return;
            }
            this.loading = true; this.inboxError = ''; this.degradedAccounts = [];
            try {
                const params = new URLSearchParams({ q: this.searchQuery });
                if (this.searchAccountFilter) params.set('account', this.searchAccountFilter);
                if (this.searchFolderFilter) params.set('folder', this.searchFolderFilter);
                const since = this.getDateSinceParam();
                if (since) params.set('since', since);
                const data = await this.fetchJson('/api/search?' + params.toString());
                this.page = 1; this.mails = data.emails || []; this.totalMails = data.total || this.mails.length;
                await this.restoreSelectedMail(); this.persistState();
            } catch (error) { this.inboxError = error.message || 'Suche fehlgeschlagen'; }
            finally { this.loading = false; }
        },

        highlightSnippet(text) {
            if (!text) return '';
            return text.replace(/\[([^\]]*)\]/g, '<mark class="bg-yellow-200 dark:bg-yellow-800/40 rounded px-0.5">$1</mark>');
        },

        async openAiPanel() {
            this.showAiPanel = true;
            this.$nextTick(() => lucide.createIcons());
            try { this.aiStatus = await this.fetchJson('/api/rag/status'); }
            catch (_) { this.aiStatus = { total_emails: 0, model: '?', ollama_reachable: false }; }
            await this.loadAiHistory();
        },

        closeAiPanel() { this.showAiPanel = false; },

        async askAiQuestion() {
            if (!this.aiQuestion.trim()) return;
            this.aiLoading = true; this.aiError = ''; this.aiAnswer = null;
            try {
                const payload = { query: this.aiQuestion, limit: 10 };
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 30000);
                const response = await fetch('/api/rag/query', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), signal: controller.signal });
                clearTimeout(timeout);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                this.aiAnswer = { answer: data.answer, sources: data.sources || [], email_count: data.email_count || 0, query: this.aiQuestion };
                this.aiQuestion = '';
                await this.loadAiHistory();
            } catch (error) {
                this.aiError = error.name === 'AbortError' ? 'Die Antwort dauert zu lange.' : 'Fehler: ' + (error.message || 'Unbekannt');
            } finally { this.aiLoading = false; }
        },

        async openSourceEmail(source) {
            if (!source?.account || !source?.folder || !source?.msg_uid) return;
            this.closeAiPanel();
            try {
                const mail = await this.fetchJson(`/api/email/${encodeURIComponent(source.account)}/${encodeURIComponent(source.folder)}/${source.msg_uid}`);
                this.selectedMail = mail; this.selectedMailKey = `${source.account}:${source.folder}:${source.msg_uid}`;
                this.persistState(); this.$nextTick(() => lucide.createIcons());
            } catch (error) { showNotification(error.message || 'Email konnte nicht geöffnet werden', 'error'); }
        },

        async loadAiHistory() {
            try { const data = await this.fetchJson('/api/rag/history?limit=10'); this.aiHistory = data.history || []; }
            catch (_) { this.aiHistory = []; }
        },

        async triggerReindex() {
            if (!confirm('Index wirklich neu aufbauen?')) return;
            try { await this.fetchJson('/api/rag/reindex', { method: 'POST' }); showNotification('Index wird neu aufgebaut.'); }
            catch (error) { showNotification(error.message || 'Neuaufbau fehlgeschlagen', 'error'); }
        },

        sanitizeHtml(html) {
            if (typeof DOMPurify !== 'undefined') return DOMPurify.sanitize(html);
            // DOMPurify unavailable — escape HTML to prevent XSS
            const div = document.createElement('div');
            div.textContent = html;
            return div.innerHTML;
        },

        async initInlineReply() {
            if (!this.selectedMail) return;
            const key = this.mailKey(this.selectedMail);
            const saved = this.loadDraftFromLocal(key);
            if (saved) {
                this.replyDraft = saved.body || '';
                this.replySubject = saved.subject || prefixSubject(this.selectedMail.subject || '', 'Re');
                this.replyTo = saved.to || extractEmail(this.selectedMail.from || '');
                this.replyCc = saved.cc || '';
                this.replyTone = saved.tone || 'freundlich';
            } else {
                this.replyDraft = '';
                this.replySubject = prefixSubject(this.selectedMail.subject || '', 'Re');
                this.replyTo = extractEmail(this.selectedMail.from || '');
                this.replyCc = ''; this.replyTone = 'freundlich';
            }
            this.replyInReplyTo = this.selectedMail.message_id || '';
            this.replyReferences = ((this.selectedMail.references ? this.selectedMail.references + ' ' : '') + (this.selectedMail.message_id || '')).trim();
            this.replyAttachments = []; this.replyError = ''; this.replyGenerating = false; this.replyAdapting = false; this.replySending = false;
        },

        debounceSaveDraft() { clearTimeout(this.draftSaveTimer); this.draftSaveTimer = setTimeout(() => this.saveDraftToLocal(), 1000); },

        saveDraftToLocal() {
            if (!this.selectedMail) return;
            const key = this.mailKey(this.selectedMail);
            if (!this.replyDraft.trim()) { delete this.savedDrafts[key]; }
            else { this.savedDrafts[key] = { body: this.replyDraft, subject: this.replySubject, to: this.replyTo, cc: this.replyCc, tone: this.replyTone, ts: new Date().toISOString() }; }
            try { localStorage.setItem('mail-ai-sorter.drafts.v1', JSON.stringify(this.savedDrafts)); } catch (_) {}
        },

        loadDraftFromLocal(key) { return this.savedDrafts[key] || null; },

        clearDraftForMail(key) {
            delete this.savedDrafts[key];
            try { localStorage.setItem('mail-ai-sorter.drafts.v1', JSON.stringify(this.savedDrafts)); } catch (_) {}
        },

        discardReplyDraft() { this.replyDraft = ''; if (this.selectedMail) this.clearDraftForMail(this.mailKey(this.selectedMail)); },

        async sendInlineReply() {
            if (!this.replyDraft.trim() || !this.selectedMail) return;
            this.replySending = true; this.replyError = '';
            try {
                await this.fetchJson('/api/send', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account: this.selectedMail.account, to: [this.replyTo], cc: this.replyCc ? this.replyCc.split(',').map(s => s.trim()).filter(Boolean) : [], subject: this.replySubject, body_text: this.replyDraft, in_reply_to: this.replyInReplyTo || null, references: this.replyReferences || null, attachments: this.replyAttachments }),
                });
                this.clearDraftForMail(this.mailKey(this.selectedMail));
                this.replyDraft = ''; this.replyAttachments = [];
                showNotification('Email gesendet');
            } catch (error) { this.replyError = error.message || 'Senden fehlgeschlagen'; }
            finally { this.replySending = false; }
        },

        async generateReplyDraft() {
            if (!this.selectedMail) return;
            this.replyGenerating = true; this.replyError = '';
            try {
                const threadContext = (this.selectedMail.thread || []).slice(-3).map(item => ({ from: item.from || '?', subject: item.subject || '?', body: (item.body_text || '').substring(0, 500) }));
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 30000);
                const response = await fetch('/api/llm/quick-reply', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ subject: this.selectedMail.subject || '', from_addr: this.selectedMail.from || '', body: this.selectedMail.body_text || this.selectedMail.body_html || '', tone: this.replyTone, language: 'de', thread_context: threadContext }),
                    signal: controller.signal,
                });
                clearTimeout(timeout);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                this.replyDraft = data.reply || '';
                if (data.subject) this.replySubject = data.subject;
            } catch (error) {
                this.replyError = error.name === 'AbortError' ? 'KI-Antwort dauert zu lange.' : 'KI-Entwurf fehlgeschlagen: ' + (error.message || '');
            } finally { this.replyGenerating = false; }
        },

        async adaptReplyWithAI() {
            if (!this.replyDraft.trim() || !this.selectedMail) return;
            this.replyAdapting = true; this.replyError = '';
            try {
                const threadContext = (this.selectedMail.thread || []).slice(-3).map(item => ({ from: item.from || '?', subject: item.subject || '?', body: (item.body_text || '').substring(0, 500) }));
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 30000);
                const response = await fetch('/api/llm/adapt-template', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ template_body: this.replyDraft, subject: this.selectedMail.subject || '', from_addr: this.selectedMail.from || '', body: this.selectedMail.body_text || this.selectedMail.body_html || '', tone: this.replyTone, language: 'de', thread_context: threadContext }),
                    signal: controller.signal,
                });
                clearTimeout(timeout);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                if (data.reply) this.replyDraft = data.reply;
            } catch (error) {
                this.replyError = error.name === 'AbortError' ? 'KI-Anpassung dauert zu lange.' : 'KI-Anpassung fehlgeschlagen: ' + (error.message || '');
            } finally { this.replyAdapting = false; }
        },

        async loadTemplates() {
            try { const data = await this.fetchJson('/api/templates'); this.templates = data.templates || []; }
            catch (_) { this.templates = []; }
        },

        get filteredTemplates() {
            if (!this.templateSearchQuery.trim()) return this.templates;
            const q = this.templateSearchQuery.toLowerCase();
            return this.templates.filter(t => t.name.toLowerCase().includes(q) || t.body.toLowerCase().includes(q));
        },

        insertTemplate(tmpl) {
            if (!this.replyDraft.trim()) this.replyDraft = tmpl.body;
            else this.replyDraft += '\n\n' + tmpl.body;
        },

        handleReplyAttachments(event) {
            const files = Array.from(event.target.files || []);
            for (const file of files) {
                const reader = new FileReader();
                reader.onload = () => {
                    this.replyAttachments.push({ filename: file.name, size: file.size, data_b64: String(reader.result).split(',')[1] || '' });
                    this.replyAttachments = [...this.replyAttachments];
                };
                reader.readAsDataURL(file);
            }
            event.target.value = '';
        },

        openTemplateManager() {
            this.showTemplateManager = true; this.editingTemplate = null;
            this.templateForm = { name: '', body: '', category: 'Allgemein' };
            this.loadTemplates(); this.$nextTick(() => lucide.createIcons());
        },

        closeTemplateManager() { this.showTemplateManager = false; },

        async saveTemplate() {
            const form = this.templateForm;
            if (!form.name.trim() || !form.body.trim()) return;
            try {
                if (this.editingTemplate) {
                    await this.fetchJson(`/api/templates/${this.editingTemplate.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form) });
                } else {
                    await this.fetchJson('/api/templates', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form) });
                }
                await this.loadTemplates(); this.editingTemplate = null;
                this.templateForm = { name: '', body: '', category: 'Allgemein' };
            } catch (error) { showNotification(error.message || 'Vorlage konnte nicht gespeichert werden', 'error'); }
        },

        editTemplate(tmpl) {
            this.editingTemplate = tmpl;
            this.templateForm = { name: tmpl.name, body: tmpl.body, category: tmpl.category || 'Allgemein' };
        },

        async deleteTemplate(id) {
            if (!confirm('Vorlage wirklich löschen?')) return;
            try { await this.fetchJson(`/api/templates/${id}`, { method: 'DELETE' }); await this.loadTemplates(); }
            catch (error) { showNotification(error.message || 'Löschen fehlgeschlagen', 'error'); }
        },
    };
}

function extractEmail(value) {
    const match = (value || '').match(/<([^>]+)>/);
    return match ? match[1] : (value || '').trim();
}

function refreshInbox() {
    const el = document.querySelector('[x-data*="inboxApp"]');
    if (el && el.__x) { el.__x.$data.refreshFolders(); el.__x.$data.loadMails(); }
}

function openNewCompose() {
    const el = document.querySelector('[x-data*="inboxApp"]');
    if (el && el.__x) el.__x.$data.openNewCompose();
}

function prefixSubject(subject, prefix) {
    if (!subject) return `${prefix}: `;
    const pattern = prefix === 'Re' ? /^((Re|AW|Aw):\s*)+/i : /^((Fwd?|WG):\s*)+/i;
    return pattern.test(subject) ? subject : `${prefix}: ${subject}`;
}
</script>
