<!DOCTYPE html>
<html lang="de" x-data="{ darkMode: localStorage.getItem('darkMode') === 'true' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches) }" :class="{ 'dark': darkMode }" x-init="$watch('darkMode', val => localStorage.setItem('darkMode', val))">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Superhero Mail{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50:'#eef2ff', 100:'#e0e7ff', 200:'#c7d2fe', 300:'#a5b4fc', 400:'#818cf8', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca', 800:'#3730a3', 900:'#312e81' },
                        surface: { 0:'#0f0f11', 1:'#16161a', 2:'#1c1c21', 3:'#242429', 4:'#2c2c33' },
                    },
                    fontFamily: { sans: ['-apple-system','BlinkMacSystemFont','Inter','Segoe UI','sans-serif'] },
                },
            },
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    {% block scripts %}{% endblock %}
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { -webkit-font-smoothing: antialiased; }
        body { font-size: 14px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .dark ::-webkit-scrollbar-thumb { background: #444; }
        @keyframes slideUp { 0% { opacity:0; transform:translateY(8px) } 100% { opacity:1; transform:translateY(0) } }
        @keyframes fadeIn { 0% { opacity:0 } 100% { opacity:1 } }
        .cmd-overlay { animation: fadeIn 0.15s ease-out; }
        .cmd-panel { animation: slideUp 0.2s ease-out; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-white dark:bg-surface-0 text-slate-800 dark:text-slate-200 h-screen overflow-hidden">
    <div class="h-screen flex flex-col">

        <!-- Top Bar -->
        <header class="h-12 flex items-center justify-between px-4 border-b border-slate-200 dark:border-surface-3 bg-white dark:bg-surface-1 shrink-0">
            <div class="flex items-center gap-3">
                <a href="/" class="flex items-center gap-2 text-brand-600 hover:text-brand-500 transition-colors">
                    <i data-lucide="zap" class="w-5 h-5"></i>
                    <span class="font-semibold text-sm tracking-tight">Superhero</span>
                </a>
                <div class="hidden md:flex items-center gap-1 ml-4">
                    {% block nav %}{% endblock %}
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button @click="$dispatch('toggle-cmd')" class="flex items-center gap-2 px-3 py-1.5 rounded-md border border-slate-200 dark:border-surface-3 text-xs text-slate-400 hover:bg-slate-50 dark:hover:bg-surface-2 transition-colors">
                    <i data-lucide="search" class="w-3.5 h-3.5"></i>
                    <span>Suchen...</span>
                    <kbd class="px-1.5 py-0.5 rounded text-[10px] bg-slate-100 dark:bg-surface-3 font-mono">⌘K</kbd>
                </button>
                <button @click="darkMode = !darkMode" class="p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-surface-2 transition-colors">
                    <i x-show="!darkMode" data-lucide="moon" class="w-4 h-4 text-slate-400"></i>
                    <i x-show="darkMode" data-lucide="sun" class="w-4 h-4 text-slate-400"></i>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <div class="flex-1 overflow-hidden">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Command Palette -->
    <div x-data="commandPalette()" @keydown.cmd.k.prevent="open = !open" @keydown.ctrl.k.prevent="open = !open" @keydown.escape.window="if(open){ open=false; query='' }" @toggle-cmd.window="open = !open">
        <template x-if="open">
            <div class="fixed inset-0 z-[100] cmd-overlay">
                <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="open=false; query=''"></div>
                <div class="relative mx-auto mt-[15vh] max-w-xl cmd-panel">
                    <div class="rounded-xl bg-white dark:bg-surface-1 shadow-2xl border border-slate-200 dark:border-surface-3 overflow-hidden">
                        <div class="flex items-center gap-3 px-4 py-3.5 border-b border-slate-100 dark:border-surface-3">
                            <i data-lucide="search" class="w-4 h-4 text-slate-400 shrink-0"></i>
                            <input x-model="query" @input="search()" @keydown.down.prevent="selectedIdx = Math.min(selectedIdx+1, filtered.length-1)" @keydown.up.prevent="selectedIdx = Math.max(selectedIdx-1, 0)" @keydown.enter.prevent="executeSelected()" x-ref="cmdInput" type="text" placeholder="Befehl oder Aktion suchen..." class="flex-1 bg-transparent text-sm outline-none dark:text-white placeholder-slate-400" x-effect="if(open) setTimeout(() => { $refs.cmdInput.focus(); lucide.createIcons() }, 50)">
                            <kbd class="px-2 py-0.5 rounded text-[10px] bg-slate-100 dark:bg-surface-3 text-slate-400 font-mono">ESC</kbd>
                        </div>
                        <div class="max-h-80 overflow-y-auto p-1.5">
                            <template x-for="(cmd, i) in filtered" :key="cmd.id">
                                <button @click="executeCommand(cmd)" @mouseenter="selectedIdx = i" :class="i === selectedIdx ? 'bg-brand-50 dark:bg-brand-900/20' : ''" class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg cursor-pointer transition-colors text-left">
                                    <div class="flex items-center gap-3">
                                        <div class="w-7 h-7 rounded-md bg-slate-100 dark:bg-surface-3 flex items-center justify-center"><i :data-lucide="cmd.icon" class="w-3.5 h-3.5 text-brand-600"></i></div>
                                        <span class="text-sm dark:text-white" x-text="cmd.label"></span>
                                    </div>
                                    <kbd x-show="cmd.shortcut" class="px-1.5 py-0.5 rounded text-[10px] bg-slate-100 dark:bg-surface-3 text-slate-400 font-mono" x-text="cmd.shortcut"></kbd>
                                </button>
                            </template>
                            <template x-if="filtered.length === 0">
                                <div class="px-4 py-8 text-center text-sm text-slate-400">Keine Ergebnisse</div>
                            </template>
                        </div>
                        <div class="flex items-center justify-between px-4 py-2 border-t border-slate-100 dark:border-surface-3 text-[10px] text-slate-400">
                            <span>↑↓ Navigate · Enter · ESC Close</span>
                            <span class="font-mono">⌘K</span>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <script>
        lucide.createIcons();

        function commandPalette() {
            return {
                open: false, query: '', commands: [], filtered: [], selectedIdx: 0,
                async init() {
                    try { const r = await fetch('/api/command-palette'); this.commands = await r.json(); }
                    catch(e) { this.commands = [{id:'inbox',label:'Inbox',icon:'inbox',shortcut:'G I',url:'/inbox'},{id:'compose',label:'Neue Email',icon:'pen-square',shortcut:'C'},{id:'search',label:'Suchen',icon:'search',shortcut:'/'},{id:'config',label:'Einstellungen',icon:'settings',url:'/config'}]; }
                    this.filtered = this.commands;
                },
                search() {
                    const q = this.query.toLowerCase();
                    this.filtered = q ? this.commands.filter(c => c.label.toLowerCase().includes(q) || (c.category||'').toLowerCase().includes(q)) : this.commands;
                    this.selectedIdx = 0;
                },
                executeSelected() { if(this.filtered[this.selectedIdx]) this.executeCommand(this.filtered[this.selectedIdx]); },
                async executeCommand(cmd) {
                    this.open = false; this.query = '';
                    if(cmd.url?.startsWith('/') && !cmd.url.startsWith('/api')) { window.location.href = cmd.url; return; }
                    if(cmd.id === 'dark_mode') { document.documentElement.classList.toggle('dark'); showNotification('Theme gewechselt'); return; }
                    if(cmd.id === 'refresh' && typeof refreshInbox === 'function') { refreshInbox(); showNotification('Aktualisiert'); return; }
                    if(cmd.id === 'compose' && typeof openNewCompose === 'function') { openNewCompose(); return; }
                    if(cmd.id === 'sorter_start') { await fetch('/api/sorter/start',{method:'POST'}); showNotification('Daemon gestartet'); return; }
                    if(cmd.id === 'sorter_stop') { await fetch('/api/sorter/stop',{method:'POST'}); showNotification('Daemon gestoppt'); return; }
                    if(cmd.id === 'sorter_run') { await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dry_run:false,max_mails:10})}); showNotification('Sortierung gestartet'); return; }
                }
            }
        }

        function showNotification(msg, type='success') {
            const el = document.createElement('div');
            el.className = `fixed top-4 right-4 px-4 py-2.5 rounded-lg shadow-lg z-[200] text-sm font-medium text-white ${type==='success'?'bg-brand-600':'bg-red-600'} animate-[slideUp_0.3s_ease-out]`;
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2500);
        }

        document.addEventListener('keydown', function(e) {
            if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
            if(e.key==='/' && !e.metaKey && !e.ctrlKey) { e.preventDefault(); window.dispatchEvent(new CustomEvent('toggle-cmd')); }
        });
    </script>

    <style>
        .nav-item { display:flex; align-items:center; gap:0.375rem; padding:0.3rem 0.6rem; border-radius:0.375rem; font-size:0.8rem; font-weight:500; color:#64748b; transition:all 0.1s; }
        .dark .nav-item { color:#94a3b8; }
        .nav-item:hover { background:#f1f5f9; }
        .dark .nav-item:hover { background:#242429; }
        .nav-item.active { background:#eef2ff; color:#4f46e5; }
        .dark .nav-item.active { background:#1e1b4b; color:#818cf8; }
    </style>
</body>
</html>
