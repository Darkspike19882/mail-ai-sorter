<!DOCTYPE html>
<html lang="de" x-data="{ darkMode: localStorage.getItem('darkMode') === 'true' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches) }" :class="{ 'dark': darkMode }" x-init="$watch('darkMode', val => localStorage.setItem('darkMode', val))">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mail AI Sorter{% endblock %}</title>

    <!-- Tailwind CSS (via CDN für einfache Integration) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-in',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                    },
                },
            },
        }
    </script>

    <!-- Alpine.js für interaktive UI -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Chart.js für Diagramme -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- DOMPurify for safe HTML rendering -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #0ea5e9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>

    {% block head %}{% endblock %}
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 dark:from-slate-900 dark:to-slate-800 min-h-screen transition-colors duration-300">
    <div x-data="{ mobileMenuOpen: false }" class="min-h-screen">
        <!-- Navigation -->
        <nav class="bg-white dark:bg-slate-800 shadow-lg sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 flex items-center gap-2">
                            <i data-lucide="bot" class="w-8 h-8 text-primary-600"></i>
                            <span class="text-xl font-bold gradient-text">Mail AI Sorter</span>
                        </div>
                        <div class="hidden md:ml-10 md:flex md:space-x-4">
                            <a href="/inbox" class="nav-link {% block nav_inbox %}{% endblock %}">
                                <i data-lucide="inbox" class="w-4 h-4 inline mr-1"></i>
                                Inbox
                            </a>
                            <a href="/" class="nav-link {% block nav_dashboard %}{% endblock %}">
                                <i data-lucide="layout-dashboard" class="w-4 h-4 inline mr-1"></i>
                                Dashboard
                            </a>
                            <a href="/config" class="nav-link {% block nav_config %}{% endblock %}">
                                <i data-lucide="settings" class="w-4 h-4 inline mr-1"></i>
                                Konfiguration
                            </a>
                            <a href="/logs" class="nav-link {% block nav_logs %}{% endblock %}">
                                <i data-lucide="file-text" class="w-4 h-4 inline mr-1"></i>
                                Logs
                            </a>
                            <a href="/stats" class="nav-link {% block nav_stats %}{% endblock %}">
                                <i data-lucide="bar-chart-3" class="w-4 h-4 inline mr-1"></i>
                                Statistiken
                            </a>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <button @click="darkMode = !darkMode" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                            <i x-show="!darkMode" data-lucide="moon" class="w-5 h-5"></i>
                            <i x-show="darkMode" data-lucide="sun" class="w-5 h-5"></i>
                        </button>
                        <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
                            <i data-lucide="menu" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Mobile Menu -->
            <div x-show="mobileMenuOpen" @click.away="mobileMenuOpen = false" class="md:hidden bg-white dark:bg-slate-800 border-t dark:border-slate-700">
                <div class="px-2 pt-2 pb-3 space-y-1">
                    <a href="/inbox" class="mobile-nav-link {% block nav_mobile_inbox %}{% endblock %}">
                        <i data-lucide="inbox" class="w-4 h-4 inline mr-2"></i>
                        Inbox
                    </a>
                    <a href="/" class="mobile-nav-link {% block nav_mobile_dashboard %}{% endblock %}">
                        <i data-lucide="layout-dashboard" class="w-4 h-4 inline mr-2"></i>
                        Dashboard
                    </a>
                    <a href="/config" class="mobile-nav-link {% block nav_mobile_config %}{% endblock %}">
                        <i data-lucide="settings" class="w-4 h-4 inline mr-2"></i>
                        Konfiguration
                    </a>
                    <a href="/logs" class="mobile-nav-link {% block nav_mobile_logs %}{% endblock %}">
                        <i data-lucide="file-text" class="w-4 h-4 inline mr-2"></i>
                        Logs
                    </a>
                    <a href="/stats" class="mobile-nav-link {% block nav_mobile_stats %}{% endblock %}">
                        <i data-lucide="bar-chart-3" class="w-4 h-4 inline mr-2"></i>
                        Statistiken
                    </a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {% block content %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="bg-white dark:bg-slate-800 border-t dark:border-slate-700 mt-auto">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-400">
                        <i data-lucide="heart" class="w-4 h-4 text-red-500"></i>
                        <span>Made with ❤️ for Open Source</span>
                    </div>
                    <div class="flex items-center gap-4 text-sm text-slate-600 dark:text-slate-400">
                        <span class="flex items-center gap-1">
                            <i data-lucide="cpu" class="w-4 h-4"></i>
                            Optimized for Apple Silicon
                        </span>
                        <span class="flex items-center gap-1">
                            <i data-lucide="shield" class="w-4 h-4"></i>
                            100% Local & Private
                        </span>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // Lucide Icons initialisieren
        lucide.createIcons();

        // Globale Funktionen
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 p-4 rounded-lg shadow-lg z-50 animate-slide-up ${
                type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'
            } text-white`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        function formatNumber(num) {
            return new Intl.NumberFormat('de-DE').format(num);
        }
    </script>

    <style>
        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #334155;
            transition: all 0.15s;
        }
        .dark .nav-link { color: #e2e8f0; }
        .nav-link:hover { background: #f1f5f9; }
        .dark .nav-link:hover { background: #334155; }
        .nav-link.active { background: #e0f2fe; color: #0369a1; }
        .dark .nav-link.active { background: #0c4a6e; color: #7dd3fc; }

        .mobile-nav-link {
            display: block;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            color: #334155;
            transition: all 0.15s;
        }
        .dark .mobile-nav-link { color: #e2e8f0; }
        .mobile-nav-link:hover { background: #f1f5f9; }
        .dark .mobile-nav-link:hover { background: #334155; }
        .mobile-nav-link.active { background: #e0f2fe; color: #0369a1; }
        .dark .mobile-nav-link.active { background: #0c4a6e; color: #7dd3fc; }
    </style>

    {% block scripts %}{% endblock %}
</body>
</html>
